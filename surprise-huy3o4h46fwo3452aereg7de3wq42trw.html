<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <title>お母さんへ</title>
  
  <!-- Google Fontsで美しい明朝体を読み込む -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500&display=swap" rel="stylesheet">
  
  <style>
    body {
      margin: 0;
      padding: 0;
      /* 全体の背景：上品なごく薄いピンク */
      background-color: #fcf4f6; 
      /* 文字色：真っ黒ではなく、温かみのあるブラウン系グレー */
      color: #5c4b51;
      font-family: 'Shippori Mincho', serif;
      line-height: 2.2;
      letter-spacing: 0.08em;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .letter-container {
      width: 85%;
      max-width: 500px;
      padding: 40px 30px;
      /* 手紙の背景：少し透け感のある白で柔らかさを出す */
      background: rgba(255, 255, 255, 0.95);
      /* くすみピンクの影をつけて浮き上がらせる */
      box-shadow: 0 10px 25px rgba(214, 176, 184, 0.25);
      border-radius: 12px;
      border: 1px solid #f2e1e4;
      margin: 40px auto;
      
      /* フワッと浮かび上がるアニメーション */
      opacity: 0;
      transform: translateY(15px);
      animation: fadeIn 2s ease forwards;
      animation-delay: 0.3s;
    }

    /* 上部に配置する花の画像スタイル */
    .flower-image {
      width: 100%;
      height: 180px;
      object-fit: cover;
      border-radius: 8px;
      margin-bottom: 30px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.05);
      opacity: 0.9;
    }

    /* 宛名のスタイル */
    h1 {
      font-size: 1.2rem;
      font-weight: 500;
      margin-bottom: 25px;
      text-align: left;
      /* 宛名の下に細いピンクの線を引く */
      border-bottom: 1px solid #e8d3d8;
      padding-bottom: 15px;
      color: #7a5c61;
    }

    /* 本文のスタイル */
    p {
      font-size: 1rem;
      margin-bottom: 20px;
      text-align: justify;
    }

    /* 署名のスタイル */
    .signature {
      text-align: right;
      margin-top: 40px;
      font-size: 1.1rem;
      color: #7a5c61;
    }

    @keyframes fadeIn {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>

  <div class="letter-container">
    <!-- ↓ここにお花の画像を表示します（同じフォルダに flower.jpg を置く場合）↓ -->
    <h1>お母さんへ</h1>
    
    <p>
      今日は私のピアノの発表会に来てくれてありがとう。<br>
      あああああああああああああああああああああああああああああ
    </p>
    
    <p>
      今回のテーマは「無償の愛、慈悲の愛」です。<br>
      あああああああああああああああああああああああああああああ<br>
      あああああああああああああああああああああああああああああ
    </p>

    <p>
      あああああああああああああああああああああああああああああ<br>
      あああああああああああああああああああああああああああああ<br>
      あああああああああああああああああああああああああああああ
    </p>

    <div class="signature">
      みゆうより
    </div>
  </div>

</body>
</html>
